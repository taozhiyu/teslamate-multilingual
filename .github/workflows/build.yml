name: Build Teslamate Multilingual

on:
  schedule:
    # 每天 UTC 0 点检查更新
    - cron: '0 0 * * *'
  # 手动触发
  workflow_dispatch:
    inputs:
      target_lang:
        description: 'Target language (e.g., zh-CN, zh-TW, ja)'
        required: false
        type: string
      force_rebuild:
        description: 'Force rebuild even without version update'
        required: false
        type: boolean
        default: false
  # 当 dashboards 目录下的翻译文件被修改时触发
  push:
    paths:
      - 'dashboards/**/*.json'
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  check-update:
    name: Check for updates
    runs-on: ubuntu-latest
    outputs:
      needs_update: ${{ steps.check.outputs.needs_update }}
      latest_version: ${{ steps.check.outputs.latest_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get current version
        id: current
        run: |
          if [ -f VERSION ]; then
            echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT
          else
            echo "version=" >> $GITHUB_OUTPUT
          fi

      - name: Get latest teslamate version
        id: check
        run: |
          LATEST=$(curl -s https://api.github.com/repos/teslamate-org/teslamate/releases/latest | grep -o '"tag_name": "v[^"]*"' | cut -d'"' -f4 | sed 's/v//')
          echo "latest_version=$LATEST" >> $GITHUB_OUTPUT
          echo "latest=$LATEST" >> $GITHUB_OUTPUT

          CURRENT="${{ steps.current.outputs.version }}"
          if [ -z "$CURRENT" ] || [ "$CURRENT" != "$LATEST" ]; then
            echo "needs_update=true" >> $GITHUB_OUTPUT
          else
            echo "needs_update=false" >> $GITHUB_OUTPUT
          fi

          echo "Current: $CURRENT, Latest: $LATEST"

  translate:
    name: Translate dashboards
    needs: check-update
    runs-on: ubuntu-latest
    if: needs.check-update.outputs.needs_update == 'true' || github.event.inputs.force_rebuild == 'true'
    outputs:
      langs: ${{ steps.translate.outputs.langs }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build TypeScript
        run: pnpm run build

      - name: Get target languages
        id: langs
        run: |
          if [ -n "${{ github.event.inputs.target_lang }}" ]; then
            LANGS="${{ github.event.inputs.target_lang }}"
          else
            LANGS="${TARGET_LANGS:-zh-CN}"
          fi
          echo "langs=$LANGS" >> $GITHUB_OUTPUT
          echo "Translating to: $LANGS"

      - name: Download teslamate dashboards
        env:
          TESLAMATE_VERSION: ${{ needs.check-update.outputs.latest_version }}
        run: |
          mkdir -p /tmp/teslamate
          curl -sL "https://raw.githubusercontent.com/teslamate-org/teslamate/v${TESLAMATE_VERSION}/grafana/dashboards/index.json" | \
            jq -r '.[].filename' | while read -r f; do
              curl -sL "https://raw.githubusercontent.com/teslamate-org/teslamate/v${TESLAMATE_VERSION}/grafana/dashboards/$f" -o "/tmp/teslamate/$f"
            done
          ls /tmp/teslamate/

      - name: Translate with AI
        env:
          AI_PROVIDER: ${{ secrets.AI_PROVIDER }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          TARGET_LANGS: ${{ steps.langs.outputs.langs }}
        run: |
          node dist/index.js

      - name: Update VERSION file
        run: |
          echo "${{ needs.check-update.outputs.latest_version }}" > VERSION

      - name: Commit translations
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update translations for teslamate ${{ needs.check-update.outputs.latest_version }}"
          file_pattern: dashboards/*.json VERSION

  build:
    name: Build Docker images
    needs: [check-update, translate]
    runs-on: ubuntu-latest
    if: needs.check-update.outputs.needs_update == 'true' || github.event.inputs.force_rebuild == 'true' || (github.event_name == 'push' && contains(github.event.head_commit.modified, 'dashboards/'))
    strategy:
      matrix:
        lang: ${{ fromJson(needs.translate.outputs.langs || '["zh-CN"]') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get teslamate version
        id: version
        run: |
          if [ -f VERSION ]; then
            echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT
          else
            # 获取最新版本
            VERSION=$(curl -s https://api.github.com/repos/teslamate-org/teslamate/releases/latest | grep -o '"tag_name": "v[^"]*"' | cut -d'"' -f4 | sed 's/v//')
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/teslamate-${{ matrix.lang }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/teslamate-${{ matrix.lang }}:${{ steps.version.outputs.version }}
          build-args: |
            TESLAMATE_VERSION=${{ steps.version.outputs.version }}
            DASHBOARD_LANG=${{ matrix.lang }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify:
    name: Notify on completion
    needs: [build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "✅ Build completed successfully" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Images pushed:" >> $GITHUB_STEP_SUMMARY
            echo "- ghcr.io/${{ env.IMAGE_NAME }}/teslamate-{lang}:latest" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Build failed" >> $GITHUB_STEP_SUMMARY
            echo "Error: ${{ needs.build.outputs.error }}" >> $GITHUB_STEP_SUMMARY
          fi